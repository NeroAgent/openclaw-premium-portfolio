name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - 'hosting/checkout-server/**'
  workflow_dispatch:

jobs:
  deploy:
    uses: sws2apps/render-deployment@v2.1.0
    with:
      service-id: ${{ secrets.RENDER_SERVICE_ID }}
      secret-key: ${{ secrets.RENDER_SECRET_KEY }}
      wait: true
      timeout: 15
    secrets:
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_SECRET_KEY: ${{ secrets.RENDER_SECRET_KEY }}
