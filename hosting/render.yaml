services:
  - type: web
    name: openclaw-provisioning
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: STRIPE_SECRET
        fromSecret: STRIPE_SECRET
      - key: STRIPE_WEBHOOK_SECRET
        fromSecret: STRIPE_WEBHOOK_SECRET
      - key: HETZNER_API_TOKEN
        fromSecret: HETZNER_API_TOKEN
      - key: PROVISIONING_BASE_URL
        value: https://openclaw-provisioning.onrender.com
      - key: PORT
        value: 3000
    plan: starter  # $7/mo for always-on (free tier sleeps)
